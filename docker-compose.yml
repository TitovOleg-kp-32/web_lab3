services:
  casdoor:
    image: casbin/casdoor-all-in-one
    container_name: casdoor
    restart: unless-stopped
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: casdoor_https
    restart: unless-stopped
    depends_on:
      - casdoor
    ports:
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./localhost+2.pem:/etc/nginx/certs/localhost+2.pem:ro
      - ./localhost+2-key.pem:/etc/nginx/certs/localhost+2-key.pem:ro